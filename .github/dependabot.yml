version: 2
updates:
  # npm packages
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    groups:
      # Batch all patch/minor updates into one PR to reduce noise.
      minor-and-patch:
        update-types:
          - 'patch'
          - 'minor'
    # Never auto-bump major versions of these — breaking API risk; migrate deliberately.
    ignore:
      - dependency-name: 'playcanvas'
        update-types: ['version-update:semver-major']
      # Vite 8 broke the strict tsc gate (config/plugin API type change); pinned to v6
      # until a tested migration is scheduled. See closed PR #8.
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'ci'
