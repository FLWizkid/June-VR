<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0c10" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>AR Blood Pressure Cuff</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0c10;
        color: #e8edf2;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      /* The PlayCanvas canvas fills the viewport. */
      #app-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      /* DOM overlay root for UI rendered on top of the 3D canvas. */
      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      #ui-root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="app-canvas" aria-label="AR Blood Pressure Cuff viewport"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
