<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June-VR · Headset Mirror</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0a0c10; color: #e8edf2;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #root { display: flex; flex-direction: column; height: 100%; }
      header {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 20px; border-bottom: 1px solid #1e2530;
        background: #10141b;
      }
      header h1 { font-size: 15px; font-weight: 600; margin: 0; }
      header .status {
        margin-left: auto; font-size: 13px; padding: 4px 10px;
        border-radius: 999px; background: #1e2530;
      }
      header .status.live { background: #0e5c2f; color: #b5ffd0; }
      header .status.err { background: #5c1f1f; color: #ffb5b5; }
      main {
        flex: 1; display: grid; place-items: center;
        padding: 20px; overflow: hidden;
      }
      #stage {
        width: 100%; height: 100%; max-width: 1600px;
        background: #000; border-radius: 12px; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid #1e2530;
      }
      video { width: 100%; height: 100%; object-fit: contain; background: #000; }
      .setup { padding: 32px; text-align: center; max-width: 460px; }
      .setup h2 { margin: 0 0 12px; font-size: 18px; }
      .setup p { margin: 8px 0; opacity: 0.75; font-size: 14px; line-height: 1.5; }
      .setup input {
        margin-top: 16px; padding: 10px 14px; font-size: 15px;
        background: #1e2530; color: #e8edf2; border: 1px solid #2a3340;
        border-radius: 8px; width: 100%; text-align: center;
      }
      .setup button {
        margin-top: 12px; padding: 10px 24px; font-size: 15px; font-weight: 600;
        background: #4a7cff; color: white; border: none;
        border-radius: 8px; cursor: pointer; width: 100%;
      }
      .setup button:hover { background: #3a6cef; }
      footer {
        padding: 8px 20px; font-size: 12px; opacity: 0.6;
        border-top: 1px solid #1e2530; text-align: center;
      }
      code { background: #1e2530; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root">
      <header>
        <h1>🥽 June-VR · Headset Mirror</h1>
        <span id="status" class="status">Idle</span>
      </header>
      <main id="main">
        <div id="stage">
          <div class="setup" id="setup">
            <h2>Connect to the headset</h2>
            <p>
              On the Samsung Galaxy XR, launch the app and open the
              <strong>Mirror</strong> panel. Type the session code it shows
              below, or use the code in the URL <code>?code=</code>.
            </p>
            <input id="code-input" placeholder="e.g. bp-cuff-demo-42" autocomplete="off" />
            <button id="connect-btn">Connect</button>
          </div>
        </div>
      </main>
      <footer id="footer">
        Peer-to-peer WebRTC via PeerJS · No video is sent to any server.
      </footer>
    </div>

    <script type="module" src="/src/mirror/viewer.ts"></script>
  </body>
</html>
