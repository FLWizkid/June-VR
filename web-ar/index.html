<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AR Blood-Pressure Device (PlayCanvas / Android XR)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; font-family: system-ui, sans-serif; }
    #application { width: 100%; height: 100%; touch-action: none; }
    #ui { position: fixed; left: 0; right: 0; bottom: 24px; display: flex; justify-content: center; pointer-events: none; }
    #startAr { pointer-events: auto; font-size: 18px; padding: 14px 28px; border: 0; border-radius: 999px;
               background: #1f8fff; color: #fff; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
    #startAr[disabled] { background: #555; }
    #status { position: fixed; top: 12px; left: 12px; right: 12px; color: #ddd; font-size: 13px;
              background: rgba(0,0,0,.5); padding: 8px 12px; border-radius: 8px; white-space: pre-line; }
  </style>
</head>
<body>
  <canvas id="application"></canvas>
  <div id="status">Loading…</div>
  <div id="ui"><button id="startAr" disabled>Start AR</button></div>

  <!-- PlayCanvas engine from CDN. Pin a version for production. -->
  <script src="https://code.playcanvas.com/playcanvas-stable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
